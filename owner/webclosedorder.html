<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>รายการออเดอร์</title>
    <link href="./src/output.css" rel="stylesheet">
    <link rel="icon" href="./img/favicon.ico">
    <script src="https://kit.fontawesome.com/b118461cf7.js" crossorigin="anonymous"></script>
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
</head>

<body class="bg-bg max-w-[1920px] min-h-[1080px] my-auto mx-auto font-kanit">

    <!--Navbar-->
    <nav class="relative z-[110] bg-white flex flex-row justify-between shadow-lg items-center py-3">
        <div class="flex items-center gap-7">
            <img src="./img/logo-rbg.png" rel="img-logo"
                class="size-25 inset-shadow-2xs shadow-lg ml-15 rounded-full">
            <div class="flex-col font-medium text-green-logo">
                <p class="text-[40px]">ร้านสดชื่น</p>
                <p class="text-2xl">หน้า ม.พะเยา</p>
            </div>
        </div>

        <div class="flex gap-15 items-center mr-12">
            <div>
                <div class="flex gap-3 text-3xl mb-1">
                    <i class="fa-solid fa-calendar"></i>
                    <p class="font-semibold">12 / 30 / 2569</p>
                </div>
                <div class="flex gap-3 text-3xl justify-end">
                    <i class="fa-regular fa-clock mt-1"></i>
                    <p class="font-semibold text-green-logo">12 : 00 น.</p>
                </div>
            </div>

            <button id="closd-order" onclick="window.location.href = './index.html';"
                class=" flex items-center-safe border-5 bg-green-logo text-white rounded-full py-4 px-8 hover:cursor-pointer duration-300 hover:scale-95 transition-colors">
                <i id="toggle-icon" class="fa-solid fa-play text-[35px]"></i>
                <p id="toggle-text" class="font-bold text-[32px]"> เปิดรับออเดอร์</p>
            </button>
        </div>
    </nav>

    <!--หัวเรื่อง-->
    <header class="flex flex-col mx-15 mt-8 mb-4">
        <p class="text-[40px] font-semibold">รายการออเดอร์</p>
        <p class="text-3xl font-normal">ทานที่ร้าน หรือ กลับบ้าน</p>
    </header>

    <!--Empty-state-->
    <div id="empty-state" class="flex flex-col items-center justify-center w-full h-[500px] mb-30">
        <i class="fa-solid fa-utensils text-[120px] text-gray-300 mb-8"></i>
        <p class="text-[60px] font-bold text-gray-400">ปิดรับออเดอร์ชั่วคราว</p>
        <p class="text-3xl text-gray-400 mt-2">ยังไม่มีรายการสั่งอาหารในขณะนี้</p>
    </div>

    <footer class="flex justify-center my-5">

        <div class="bg-white w-auto h-[150px] rounded-4xl shadow-2xl content-center pr-10">
            <div class="flex gap-10">
                <!--Home page-->
                <button
                    class="flex w-[330px] h-[130px] bg-green-logo rounded-4xl ml-2 content-center p-3 duration-300 hover:scale-90">
                    <div class="bg-white/30 size-[110px] rounded-4xl content-center text-center">
                        <i class="fa-solid fa-house text-5xl text-white"></i>
                    </div>
                    <div class="flex-col content-center ml-5 text-white">
                        <p class="text-3xl font-semibold">หน้าออเดอร์</p>
                        <p class="text-[20px] font-light">HOME</p>
                    </div>
                </button>

                <!--สรุปยอดขาย-->
                <button onclick="window.location.href = './sumary.html'"
                    class="bg-white w-auto h-auto rounded-4xl p-4 content-center hover:shadow-xl text-center duration-300 hover:scale-90">
                    <i class="fa-solid fa-clipboard-list text-[45px] mb-3"></i>
                    <p class="text-3xl font-medium">สรุปยอดขาย</p>
                </button>

                <!--สรุปยอดขาย-->
                <button
                    class="bg-white w-auto h-auto rounded-4xl p-4 content-center hover:shadow-xl text-center duration-300 hover:scale-90">
                    <i class="fa-solid fa-sliders text-[45px] mb-3"></i>
                    <p class="text-3xl font-medium"> ตั้งค่าเมนู </p>
                </button>


            </div>
        </div>

    </footer>

    <!--Confirm modal-->
    <div id="confirm-modal"
        class="fixed inset-0 z-[100] bg-black/50 flex items-center justify-center hidden backdrop-blur-sm">

        <div class="bg-white rounded-4xl p-10 w-[600px] shadow-2xl flex flex-col items-center">
            <i class="fa-solid fa-circle-exclamation text-red-order text-[80px] mb-6"></i>

            <h2 class="text-4xl font-bold text-gray-800 mb-4">ยืนยันการปิดรับออเดอร์?</h2>
            <p class="text-2xl text-gray-500 mb-10 text-center">หากปิดรับออเดอร์
                ลูกค้าจะไม่สามารถสั่งอาหารผ่านระบบได้ชั่วคราว คุณแน่ใจหรือไม่?</p>

            <div class="flex gap-6 w-full">
                <button id="confirm-btn"
                    class="flex-1 py-4 rounded-full text-3xl font-semibold border-4 text-white bg-black duration-300 cursor-pointer hover:scale-95">
                    ยืนยันปิดออเดอร์
                </button>
                <button id="cancel-btn"
                    class="flex-1 py-4 rounded-full text-3xl font-semibold bg-red-order text-white hover:bg-gray-100 duration-300 shadow-lg cursor-pointer hover:scale-95">
                    ยกเลิก
                </button>
            </div>
        </div>


    </div>

</body>

</html>
